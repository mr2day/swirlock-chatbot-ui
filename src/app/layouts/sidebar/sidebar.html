<div class="sidebar">
  <app-persona-switcher [showTagline]="true" />


  <button class="new-chat" type="button" (click)="newChat()" [disabled]="session.isLoading()">
    <span class="plus" aria-hidden="true">+</span>
    <span>New chat</span>
  </button>

  <nav class="sessions" aria-label="Conversation history">
    @if (session.sessions().length === 0) {
      <div class="empty">No chats yet. Start one above.</div>
    } @else {
      @for (group of groups(); track group.label) {
        <div class="group">
          <div class="group-label">{{ group.label }}</div>
          <ul class="group-list">
            @for (s of group.items; track s.sessionId) {
              <li class="session-row">
                <a
                  class="session-link"
                  [routerLink]="['/c', s.sessionId]"
                  routerLinkActive="active"
                  (click)="onSessionClick(s.sessionId)"
                >
                  <span class="session-title">{{ s.title }}</span>
                </a>
                <button
                  class="session-delete"
                  type="button"
                  (click)="deleteSession($event, s.sessionId)"
                  aria-label="Delete chat"
                  title="Delete chat"
                >
                  ×
                </button>
              </li>
            }
          </ul>
        </div>
      }
    }
  </nav>

  <footer class="footer">
    @if (auth.isAuthenticated()) {
      <button class="logout" type="button" (click)="logout()" title="Sign out">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path
            d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3M10 17l5-5-5-5M15 12H3"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>Sign out</span>
      </button>
    }
    <span class="footer-text">v0.1 · connected to local orchestrator</span>
  </footer>
</div>
