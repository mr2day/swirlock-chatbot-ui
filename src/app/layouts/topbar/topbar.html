<header class="topbar">
  <button
    class="hamburger"
    type="button"
    (click)="toggle()"
    aria-label="Toggle sidebar"
    title="Toggle sidebar"
  >
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path
        d="M3 6h18M3 12h18M3 18h18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      />
    </svg>
  </button>

  <div class="title">
    <img class="title-avatar" [src]="persona.active().logoUrl" alt="" />
    <span class="title-name">{{ persona.active().name }}</span>
  </div>

  <div class="spacer"></div>
</header>
