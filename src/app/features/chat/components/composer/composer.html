<div
  class="composer"
  [class.is-dragging]="dragOver()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>
  @if (attachments().length > 0) {
    <div class="attachments">
      @for (item of attachments(); track item.id) {
        <div class="attachment">
          <img [src]="item.dataUrl" [alt]="item.name" />
          <button
            type="button"
            class="remove-attachment"
            (click)="removeAttachment(item.id)"
            aria-label="Remove image"
            title="Remove image"
          >×</button>
        </div>
      }
    </div>
  }

  <div class="row">
    <button
      type="button"
      class="btn btn-attach"
      (click)="onAttachClick()"
      [disabled]="disabled() || streaming()"
      aria-label="Attach image"
      title="Attach image"
    >
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path
          d="M21 11.5l-8.5 8.5a5 5 0 01-7-7L14 4.5a3.5 3.5 0 014.95 4.95L10.5 18A2 2 0 017.65 15.15L15 7.85"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>

    <input
      #fileInput
      class="file-input"
      type="file"
      accept="image/*"
      multiple
      (change)="onFileInputChange($event)"
      hidden
    />

    <textarea
      #textarea
      class="input"
      rows="1"
      [placeholder]="placeholder()"
      [ngModel]="text()"
      (ngModelChange)="text.set($event)"
      (keydown)="onKeyDown($event)"
      (paste)="onPaste($event)"
      [disabled]="disabled()"
      autocomplete="off"
      autocapitalize="sentences"
    ></textarea>
    @if (streaming()) {
      <button
        type="button"
        class="btn btn-stop"
        (click)="onStop()"
        aria-label="Stop generation"
        title="Stop generation"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" />
        </svg>
      </button>
    } @else {
      <button
        type="button"
        class="btn btn-send"
        (click)="submit()"
        [disabled]="disabled() || (text().trim().length === 0 && attachments().length === 0)"
        aria-label="Send message"
        title="Send message"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path
            d="M4 12l16-8-6 16-3-6-7-2z"
            fill="currentColor"
          />
        </svg>
      </button>
    }
  </div>
  <div class="composer-meta">
    @if (thinkingSupported()) {
      <label class="thinking-check">
        <input
          type="checkbox"
          [ngModel]="forceThinking()"
          (ngModelChange)="forceThinking.set($event)"
          [disabled]="disabled() || streaming()"
        />
        <span>Force thinking</span>
      </label>
    }
    <div class="hint">Enter to send · Shift+Enter for newline · Paste or drop images</div>
  </div>
</div>
