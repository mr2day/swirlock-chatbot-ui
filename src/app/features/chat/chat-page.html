<div class="chat-page">
  <div #scrollHost class="messages" role="log" aria-live="polite">
    @if (hasMessages()) {
      <div class="messages-inner">
        @for (m of session.messages(); track m.localId) {
          <app-message-bubble
            [message]="m"
            [persona]="persona.active()"
            (grantLocation)="onGrantLocation($event)"
            (denyLocation)="onDenyLocation($event)"
          />
        }
        <!-- Bottom sentinel. An IntersectionObserver in chat-page.ts
             watches this element to know whether the user's viewport
             is anchored at the latest message — much more reliable
             than racing scroll events against autoscroll writes. -->
        <div #scrollSentinel class="scroll-sentinel" aria-hidden="true"></div>
      </div>
    } @else {
      <div class="empty-greeting">
        <span>How can I help you?</span>
      </div>
    }
  </div>

  @if (session.error(); as err) {
    <div class="error-banner" role="alert">
      <span>{{ err }}</span>
    </div>
  }

  <div class="composer-host">
    <app-composer
      [streaming]="session.isStreaming()"
      [disabled]="session.isLoading()"
      [personaName]="persona.active().name"
      [thinkingSupported]="thinkingSupported() ?? true"
      (send)="send($event)"
      (stop)="stop()"
    />
  </div>
</div>
